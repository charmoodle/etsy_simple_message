<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      padding: 16px;
      background: #faf9f7;
      color: #222;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 12px;
      color: #666;
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: #444;
    }
    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }
    input:focus {
      border-color: #f56400;
    }
    .btn {
      width: 100%;
      padding: 9px;
      background: #f56400;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 12px;
      transition: background 0.2s;
    }
    .btn:hover { background: #d95800; }
    .status {
      font-size: 12px;
      margin-top: 8px;
      padding: 6px 8px;
      border-radius: 4px;
      display: none;
    }
    .status.success {
      display: block;
      background: #e8f5e9;
      color: #2e7d32;
    }
    .status.error {
      display: block;
      background: #fce4ec;
      color: #c62828;
    }
    .info {
      font-size: 11px;
      color: #888;
      margin-top: 12px;
      line-height: 1.4;
    }
    .divider {
      border-top: 1px solid #eee;
      margin: 14px 0;
    }
    .key-hint {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h1>Etsy Message Assistant</h1>
  <p class="subtitle">AI-powered replies for your Etsy shops</p>

  <label for="apiKey">Claude API Key</label>
  <input type="password" id="apiKey" placeholder="sk-ant-..." />
  <p class="key-hint">Get yours at console.anthropic.com</p>

  <button class="btn" id="saveBtn">Save</button>
  <div class="status" id="status"></div>

  <div class="divider"></div>
  <p class="info">
    Open any Etsy message conversation and the assistant panel will appear automatically.
    It reads the customer's message and suggests the best response.
  </p>

  <script src="popup.js"></script>
</body>
</html>
